name: Build

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build app
        run: ./build.zsh

      - name: Package app
        run: ./package.zsh

      - name: Upload packaged app
        uses: actions/upload-artifact@v4
        with:
          name: sleep-control-macos-unsigned
          path: |
            dist/Sleep Control-macos-unsigned.zip
            dist/Sleep Control-macos-unsigned.zip.sha256

